name: CI Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore ElBruno.MarkItDotNet.slnx

      - name: Build all projects
        run: dotnet build ElBruno.MarkItDotNet.slnx --no-restore

      - name: Run tests (net8.0)
        run: dotnet test ElBruno.MarkItDotNet.slnx --no-build --framework net8.0 --verbosity normal --logger "trx;LogFileName=test-results-net8.trx"

      - name: Run tests (net10.0)
        run: dotnet test ElBruno.MarkItDotNet.slnx --no-build --framework net10.0 --verbosity normal --logger "trx;LogFileName=test-results-net10.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: "**/*.trx"
